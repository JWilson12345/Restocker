<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#1f2937;
color:white;
font-family:sans-serif;
}

.card{
background:#374151;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
margin-top:40px;
}

button{
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}
</style>

</head>

<body>

<div id="loginCard" class="card">

<h1 class="text-2xl font-bold mb-4">Admin Login</h1>

<p class="mb-2">Enter Admin Code</p>

<input id="adminCode"
type="password"
class="w-full p-2 rounded text-black mb-4"
placeholder="Enter code">

<button onclick="login()"
class="w-full bg-blue-600 p-2 rounded">
Login
</button>

<p id="loginError" class="text-red-400 mt-2"></p>

</div>



<div id="adminPanel" class="card" style="display:none;">

<h1 class="text-2xl font-bold mb-4">Notification Admin</h1>

<p class="mb-2">Current Message</p>

<div id="currentMessage"
class="bg-gray-800 p-3 rounded mb-4">
Loading...
</div>


<p class="mb-2">Send New Notification</p>

<textarea id="messageInput"
class="w-full p-2 rounded text-black mb-4"
rows="4"
placeholder="Enter notification message"></textarea>


<button onclick="sendMessage()"
class="w-full bg-green-600 p-2 rounded mb-3">
Send Notification
</button>


<button onclick="clearMessage()"
class="w-full bg-red-600 p-2 rounded">
Clear Notification
</button>

</div>



<script>

const firebaseConfig = {
apiKey: "AIzaSyDq7t9Cai2p43Ei0hCwBr_R1VYaUzPNpVM",
authDomain: "vending-machine-app-2c983.firebaseapp.com",
projectId: "vending-machine-app-2c983",
storageBucket: "vending-machine-app-2c983.firebasestorage.app",
messagingSenderId: "28676700006",
appId: "1:28676700006:web:61b8aea738475d3b133aa7"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



const correctCode = "1004";

function login(){

const entered = document.getElementById("adminCode").value;

if(entered === correctCode){

document.getElementById("loginCard").style.display="none";
document.getElementById("adminPanel").style.display="block";

listenForMessage();

}else{

document.getElementById("loginError").innerText="Incorrect Code";

}

}



function listenForMessage(){

db.collection("messages")
.doc("banner")
.onSnapshot((doc)=>{

if(doc.exists){

document.getElementById("currentMessage").innerText = doc.data().text;

}else{

document.getElementById("currentMessage").innerText = "No message";

}

});

}



function sendMessage(){

const text = document.getElementById("messageInput").value;

if(text.trim()==="") return;

db.collection("messages")
.doc("banner")
.set({
text:text
});

document.getElementById("messageInput").value="";

}



function clearMessage(){

db.collection("messages")
.doc("banner")
.set({
text:""
});

}

</script>

</body>
</html>
